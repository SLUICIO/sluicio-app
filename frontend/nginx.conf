# nginx config for the Sluicio frontend image. Serves the static Vite
# bundle with SPA fallback so client-side routes (React Router) resolve
# to index.html, and proxies /api/* to the cell-api service.
#
# The /api proxy makes the image self-contained: a single-host deploy can
# point one reverse-proxy upstream (or a browser) straight at the frontend
# and API calls just work. An outer proxy that already path-routes
# /api -> cell-api still works too — this block only handles /api requests
# that actually reach nginx.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy the API to cell-api. cell-api mounts its routes under /api/v1,
    # so we pass the prefix through unchanged (no rewrite). The upstream
    # host is the compose service name, resolved via the container's DNS.
    location /api/ {
        proxy_pass http://cell-api:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Long-cache the fingerprinted assets Vite emits under /assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Everything else falls back to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
