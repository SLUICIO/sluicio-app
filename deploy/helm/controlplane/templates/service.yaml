apiVersion: v1
kind: Service
metadata:
  name: {{ include "controlplane.fullname" . }}
  labels: {{- include "controlplane.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector: {{- include "controlplane.selectorLabels" . | nindent 4 }}
