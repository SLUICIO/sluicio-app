{{/*
Secret holding the bundled databases' passwords. Only rendered when a
cell-local Postgres or ClickHouse is enabled. External databases supply their
own credentials (postgres.dsn / clickhouse.passwordSecret).
*/}}
{{- if or .Values.postgres.enabled .Values.clickhouse.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-db
  labels: {{- include "cell.labels" (dict "root" . "component" "db") | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.postgres.enabled }}
  postgres-password: {{ .Values.postgres.auth.password | quote }}
  {{- end }}
  {{- if .Values.clickhouse.enabled }}
  clickhouse-password: {{ .Values.clickhouse.auth.password | quote }}
  {{- end }}
{{- end }}
