{{/*
Cell-local Postgres — rendered only when postgres.enabled. This is an
eval/small-install convenience; for production prefer a managed Postgres and
set postgres.enabled: false + postgres.dsn.
*/}}
{{- if .Values.postgres.enabled }}
{{- $ctx := dict "root" . "component" "postgres" -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-postgres
  labels: {{- include "cell.labels" $ctx | nindent 4 }}
spec:
  serviceName: {{ .Release.Name }}-postgres
  replicas: 1
  selector:
    matchLabels: {{- include "cell.selectorLabels" $ctx | nindent 6 }}
  template:
    metadata:
      labels: {{- include "cell.selectorLabels" $ctx | nindent 8 }}
    spec:
      securityContext:
        fsGroup: 70          # postgres runs as uid/gid 70 in the alpine image
      containers:
        - name: postgres
          image: {{ .Values.postgres.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.auth.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-db
                  key: postgres-password
            # Keep data in a subdir so the volume's lost+found doesn't block initdb.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U {{ .Values.postgres.auth.username }} -d {{ .Values.postgres.auth.database }}"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources: {{- toYaml .Values.postgres.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.postgres.storage.storageClass }}
        storageClassName: {{ .Values.postgres.storage.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage.size | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgres
  labels: {{- include "cell.labels" $ctx | nindent 4 }}
spec:
  type: ClusterIP
  selector: {{- include "cell.selectorLabels" $ctx | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
{{- end }}
