{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- $ctx := dict "root" . "component" "cell-ingest" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cell.componentName" $ctx }}
  labels: {{- include "cell.labels" $ctx | nindent 4 }}
spec:
  replicas: {{ .Values.cellIngest.replicaCount }}
  selector:
    matchLabels: {{- include "cell.selectorLabels" $ctx | nindent 6 }}
  template:
    metadata:
      labels: {{- include "cell.selectorLabels" $ctx | nindent 8 }}
    spec:
      serviceAccountName: {{ include "cell.serviceAccountName" . }}
      {{- include "cell.imagePullSecrets" . | nindent 6 }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: cell-ingest
          image: {{ include "cell.image" (dict "root" . "image" .Values.cellIngest.image) | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: otlp-http
              containerPort: 4318
          env:
            - name: CELL_INGEST_ADDR
              value: ":4318"
            # cell-ingest reads Postgres too — it verifies ingest keys there.
            {{- include "cell.dbEnv" . | nindent 12 }}
            {{- with .Values.cellIngest.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: otlp-http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: otlp-http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources: {{- toYaml .Values.cellIngest.resources | nindent 12 }}
      {{- with .Values.cellIngest.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.cellIngest.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.cellIngest.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cell.componentName" $ctx }}
  labels: {{- include "cell.labels" $ctx | nindent 4 }}
spec:
  type: {{ .Values.cellIngest.service.type }}
  ports:
    - name: otlp-http
      port: {{ .Values.cellIngest.service.port }}
      targetPort: otlp-http
  selector: {{- include "cell.selectorLabels" $ctx | nindent 4 }}
