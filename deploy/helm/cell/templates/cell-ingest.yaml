{{- $ctx := dict "root" . "component" "cell-ingest" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cell.componentName" $ctx }}
  labels: {{- include "cell.labels" $ctx | nindent 4 }}
spec:
  replicas: {{ .Values.cellIngest.replicaCount }}
  selector:
    matchLabels: {{- include "cell.selectorLabels" $ctx | nindent 6 }}
  template:
    metadata:
      labels: {{- include "cell.selectorLabels" $ctx | nindent 8 }}
    spec:
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: cell-ingest
          image: "{{ .Values.cellIngest.image.repository }}:{{ .Values.cellIngest.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: otlp-http
              containerPort: 4318
            - name: otlp-grpc
              containerPort: 4317
          env:
            {{- include "cell.dbEnv" . | nindent 12 }}
            - name: PROMETHEUS_REMOTE_WRITE_URL
              value: {{ .Values.prometheus.remoteWriteURL | quote }}
          resources: {{- toYaml .Values.cellIngest.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cell.componentName" $ctx }}
  labels: {{- include "cell.labels" $ctx | nindent 4 }}
spec:
  type: {{ .Values.cellIngest.service.type }}
  ports:
    - name: otlp-http
      port: {{ .Values.cellIngest.service.httpPort }}
      targetPort: otlp-http
    - name: otlp-grpc
      port: {{ .Values.cellIngest.service.grpcPort }}
      targetPort: otlp-grpc
  selector: {{- include "cell.selectorLabels" $ctx | nindent 4 }}
