{{/*
Secret for inline app credentials (license token, MFA key, SMTP password).
Only rendered when at least one is given inline; for each, an existingSecret
reference is preferred and bypasses this Secret entirely.
*/}}
{{- if or .Values.license.key .Values.mfa.key .Values.smtp.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-app
  labels: {{- include "cell.labels" (dict "root" . "component" "app") | nindent 4 }}
type: Opaque
stringData:
  {{- with .Values.license.key }}
  license: {{ . | quote }}
  {{- end }}
  {{- with .Values.mfa.key }}
  mfa-key: {{ . | quote }}
  {{- end }}
  {{- with .Values.smtp.password }}
  smtp-password: {{ . | quote }}
  {{- end }}
{{- end }}
