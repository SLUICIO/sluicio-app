# SPDX-License-Identifier: Apache-2.0
apiVersion: v2
name: sluicio-cell
description: |
  A complete self-hosted Sluicio cell: UI, API, OTLP ingest, and (optionally)
  bundled Postgres + ClickHouse. This is the chart both for on-premise /
  enterprise installations (Kubernetes and OpenShift) and for managed SaaS
  cells — Enterprise features are enabled at runtime by the license key, not
  by different software. The separate `controlplane` chart is SaaS-only.
type: application
version: 0.2.0
appVersion: "v0.11.27"
maintainers:
  - name: Sluicio
