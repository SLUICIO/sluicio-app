# SPDX-License-Identifier: Apache-2.0
#
# Release verification — the automated half of the use-case acceptance
# gate. Unlike ci.yml (which runs fast correctness checks on every push),
# this runs the full Playwright use-case suite against a real, seeded
# stack. It fires on a release tag and can be triggered by hand from the
# Actions tab before cutting a release.
#
# The manual half lives in docs/testing/ (the protocol catalog +
# release-acceptance.md checklist). Together they verify the documented
# use cases each release.
name: release-verification

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  e2e:
    name: Use-case E2E (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: controlplane
          POSTGRES_USER: controlplane
          POSTGRES_PASSWORD: controlplane
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U controlplane"
          --health-interval 5s --health-timeout 5s --health-retries 12
      clickhouse:
        image: clickhouse/clickhouse-server:24.8
        env:
          CLICKHOUSE_DB: telemetry
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
        ports:
          - "8123:8123"
          - "9000:9000"
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      POSTGRES_DSN: postgres://controlplane:controlplane@localhost:5432/controlplane?sslmode=disable
      CLICKHOUSE_ENDPOINT: localhost:9000
      CLICKHOUSE_DATABASE: telemetry
      CELL_API_ADDR: ":8081"
      CELL_INGEST_ADDR: ":4318"
      INGEST_ALLOW_ANONYMOUS: "true"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache: true
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Start cell-api
        run: |
          (cd services/cell-api && go run ./cmd/cell-api) > "$RUNNER_TEMP/cell-api.log" 2>&1 &
          echo "cell-api started (pid $!)"
      - name: Start cell-ingest
        run: |
          (cd services/cell-ingest && go run ./cmd/cell-ingest) > "$RUNNER_TEMP/cell-ingest.log" 2>&1 &
          echo "cell-ingest started (pid $!)"
      - name: Wait for cell-api (public install-state probe)
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8081/api/v1/auth/install-state >/dev/null 2>&1; then
              echo "cell-api ready"; exit 0
            fi
            sleep 2
          done
          echo "::error::cell-api did not become healthy"
          cat "$RUNNER_TEMP/cell-api.log" || true
          exit 1

      - name: Seed telemetry (traces, logs, metrics)
        # Use-case tests for Health/Services/Logs/Metrics need data to
        # look at. Best-effort: a seed hiccup shouldn't fail the run
        # before the suite even starts — the specs assert what they need.
        run: go run ./services/cell-ingest/cmd/seed-traces || echo "seed warning (continuing)"

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci || npm install
      - name: Install e2e deps
        working-directory: e2e
        run: npm ci || npm install
      - name: Install Playwright browser
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run use-case E2E suite
        working-directory: e2e
        run: npm test

      - name: Service logs (on failure)
        if: failure()
        run: |
          echo "::group::cell-api"; cat "$RUNNER_TEMP/cell-api.log" || true; echo "::endgroup::"
          echo "::group::cell-ingest"; cat "$RUNNER_TEMP/cell-ingest.log" || true; echo "::endgroup::"
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 14
