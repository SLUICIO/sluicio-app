# SPDX-License-Identifier: Apache-2.0
#
# release-images — build the Sluicio container images and publish them to the
# GitHub Container Registry (ghcr.io). The official public images live at
# ghcr.io/<owner>/<image> (e.g. ghcr.io/sluicio/cell-api).
#
# Fires on pushes to main (so :latest + an immutable :<sha> track main) and on
# vX.Y.Z tags (so each release gets a :<version> image), plus manual dispatch.
# Builds linux/amd64 today — every server target is amd64. arm64 is a planned
# fast-follow: the Go images compile on the build platform, so a fast multi-arch
# build wants the Dockerfiles made cross-compile-aware (ARG TARGETOS/TARGETARCH
# + GOOS/GOARCH) first; until then amd64 keeps the publish fast and reliable.
name: release-images

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "pkg/**"
      - "ee/**"
      - "frontend/**"
      - "go.work"
      - "go.work.sum"
      - "go.mod"
      - "go.sum"
      - "scripts/version.sh"
      - ".github/workflows/release-images.yml"
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  prep:
    name: Resolve version + namespace
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      commit: ${{ steps.ver.outputs.commit }}
      build_date: ${{ steps.ver.outputs.build_date }}
      ns: ${{ steps.ns.outputs.ns }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history + tags so scripts/version.sh (git describe) resolves
          # the SemVer string rather than a bare commit.
          fetch-depth: 0
      - name: Compute version
        id: ver
        run: |
          {
            echo "version=$(bash scripts/version.sh)"
            echo "commit=$(bash scripts/version.sh --commit)"
            echo "build_date=$(bash scripts/version.sh --date)"
          } >> "$GITHUB_OUTPUT"
      - name: Lowercase the registry namespace (owner)
        id: ns
        run: echo "ns=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

  images:
    name: Build + push ${{ matrix.image }} (amd64)
    needs: prep
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: cell-api,     dockerfile: services/cell-api/Dockerfile,     context: . }
          - { image: cell-ingest,  dockerfile: services/cell-ingest/Dockerfile,  context: . }
          - { image: controlplane, dockerfile: services/controlplane/Dockerfile, context: . }
          - { image: frontend,     dockerfile: frontend/Dockerfile,              context: frontend }
          - { image: demo-seeder,  dockerfile: deploy/demo/Dockerfile.seeder,    context: . }
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          # Three tags: the SemVer version, the immutable short SHA, and :latest.
          tags: |
            ${{ env.REGISTRY }}/${{ needs.prep.outputs.ns }}/${{ matrix.image }}:${{ needs.prep.outputs.version }}
            ${{ env.REGISTRY }}/${{ needs.prep.outputs.ns }}/${{ matrix.image }}:${{ needs.prep.outputs.commit }}
            ${{ env.REGISTRY }}/${{ needs.prep.outputs.ns }}/${{ matrix.image }}:latest
          build-args: |
            VERSION=${{ needs.prep.outputs.version }}
            COMMIT=${{ needs.prep.outputs.commit }}
            BUILD_DATE=${{ needs.prep.outputs.build_date }}
            APP_VERSION=${{ needs.prep.outputs.version }}
          provenance: false

  # Draft GitHub Release on every version tag — notes seeded from the tag's
  # CHANGELOG.md section, for a human to polish into the user-facing story
  # and publish. Exists because the Releases page silently fell behind
  # ghcr.io (v0.11.29–31 shipped images with no Release until noticed):
  # image publishing is automated, Release creation was memory-dependent.
  # Draft-only and skip-if-exists, so a hand-written release always wins.
  draft-release:
    name: Draft GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: images
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Create draft release seeded from CHANGELOG.md
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release $TAG already exists — leaving it untouched"
            exit 0
          fi
          # Cut this tag's section out of CHANGELOG.md (its "## <tag> — date"
          # heading up to the next "## "). The changelog-refresh commit is the
          # tagged commit, so the section is present at this ref.
          awk -v tag="$TAG" '
            $0 ~ "^## "tag" " {on=1; next}
            on && /^## / {exit}
            on {print}
          ' CHANGELOG.md > notes.md
          if ! [ -s notes.md ]; then
            echo "_See CHANGELOG.md for ${TAG}._" > notes.md
          fi
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --draft --verify-tag \
            --title "Sluicio $TAG" --notes-file notes.md
          echo "draft release created for $TAG — polish the notes and publish"

  # Image vulnerability scan — report-only, and in its OWN job so a scanner
  # problem can never block publishing again. (A bad action pin inside the
  # build+push job previously failed job setup and took the whole publish down.)
  # continue-on-error keeps findings and any scanner failure non-gating; to gate
  # later, drop continue-on-error and set exit-code 1. The Go services are
  # distroless/static so findings are near-zero; the nginx frontend carries
  # base-image CVEs. --ignore-unfixed hides advisories with no patch available.
  scan:
    name: Scan ${{ matrix.image }} (Trivy)
    needs: [prep, images]
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        image: [cell-api, cell-ingest, controlplane, frontend, demo-seeder]
    steps:
      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ needs.prep.outputs.ns }}/${{ matrix.image }}:${{ needs.prep.outputs.commit }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
