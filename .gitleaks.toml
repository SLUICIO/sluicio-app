# SPDX-License-Identifier: Apache-2.0
#
# Secret-scanning config. The e2e suite provisions throwaway users with
# hard-coded fixture passwords (e2e-demo-pw1, hijacked-pw-123, …) against a
# disposable local cell — they are test data, not credentials. Everything
# else in the repository is scanned with the default rules.

[extend]
useDefault = true

[allowlist]
description = "e2e fixture credentials are deliberate test data"
paths = ['''e2e/tests/.*''']
